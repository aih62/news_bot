name: Podcast News Notification

on:
  schedule:
    # 매일 한국 시간 오전 8시 5분 (UTC 전날 23:05)에 실행 (kakao_notify 직후)
    - cron: '5 23 * * *'
  workflow_dispatch: # 직접 실행 버튼

jobs:
  generate_podcast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Restore Authentication Files
        run: |
          # Google Drive Token
          echo '${{ secrets.GDRIVE_TOKEN }}' > token.json
          # Google Drive Credentials
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' > credentials.json

      - name: Auto Login to NotebookLM
        env:
          GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
        run: python notebooklm_login.py

      - name: Generate NotebookLM Podcast and Upload to Drive
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
        run: python generate_podcast.py
