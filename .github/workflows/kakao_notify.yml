name: KakaoTalk News Notification

on:
  schedule:
    # 매일 한국 시간 오전 8시 40분 (UTC 전날 23:40)에 실행
    - cron: '40 23 * * *'
  workflow_dispatch: # 직접 실행 버튼

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Kakao Notification
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          KAKAO_TOKEN_JSON: ${{ secrets.KAKAO_TOKEN_JSON }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
        run: python kakao_summary.py
