name: Manual Image Recovery

on:
  push:
    paths:
      - '.github/workflows/recover_images.yml'
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run recovery script
        env:
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
        run: |
          python -c "
          import requests, os
          from requests.auth import HTTPBasicAuth
          
          url = os.getenv('WP_SITE_URL').rstrip('/')
          auth = HTTPBasicAuth(os.getenv('WP_USERNAME'), os.getenv('WP_APP_PASSWORD'))
          
          # 최근 10개 포스트 중 featured_media가 0인 것들을 찾아 3221(기본 이미지)로 변경 시도
          res = requests.get(f'{url}/wp-json/wp/v2/posts', params={'per_page': 10}, auth=auth)
          if res.status_code == 200:
              for post in res.json():
                  if post['featured_media'] == 0:
                      print(f'Updating post {post[\"id\"]}')
                      requests.post(f'{url}/wp-json/wp/v2/posts/{post[\"id\"]}', json={'featured_media': 3221}, auth=auth)
          "
