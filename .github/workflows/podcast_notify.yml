name: Podcast News Notification

on:
  schedule:
    # 매일 한국 시간 오전 8시 45분 (UTC 전날 23:45)에 실행 (kakao_notify 직후)
    - cron: '45 23 * * *'
  workflow_dispatch: # 직접 실행 버튼

jobs:
  generate_podcast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Authentication Files
        run: |
          # 1. Google Drive Token
          echo '${{ secrets.GDRIVE_TOKEN }}' > token.json
          
          # 2. Google Drive Credentials
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' > credentials.json

      - name: Generate NotebookLM Podcast and Upload to Drive
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          # NotebookLM은 NOTEBOOKLM_AUTH_JSON 환경 변수만 있으면 동작합니다.
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: python generate_podcast.py
